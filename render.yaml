services:
  - type: web
    name: vbv-dashboard
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vbv-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: TOKEN_REFRESH_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRAME_INTERVAL_SECONDS
        value: "1"
      - key: CACHE_TTL_SECONDS
        value: "1800"

databases:
  - name: vbv-db
    databaseName: vbv
    plan: free
