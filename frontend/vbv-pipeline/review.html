<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Review — VBV</title>
  <link rel="stylesheet" href="/vbv-pipeline/vbvStyle.css">
  <style>
    body { background: var(--bg); }

    /* ── Review shell ── */
    .rv-shell { display: flex; flex-direction: column; min-height: 100vh; }

    .rv-topbar {
      background: var(--sidebar-bg);
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .rv-topbar .rv-logo { font-size: 1rem; font-weight: 700; color: #fff; text-decoration: none; }
    .rv-topbar .rv-logo span { color: var(--accent); }
    .rv-topbar .rv-title { font-size: 0.95rem; color: #d1d5db; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rv-topbar .rv-meta { font-size: 0.8rem; color: #9ca3af; white-space: nowrap; }

    /* ── Count bar ── */
    .rv-count-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 0.85rem;
      flex-wrap: wrap;
    }
    .rv-count-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .rv-count-num { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .rv-count-num.green { color: #10b981; }
    .rv-count-num.red { color: var(--accent); }
    .rv-back-link { margin-left: auto; font-size: 0.82rem; color: var(--accent); text-decoration: none; }
    .rv-back-link:hover { text-decoration: underline; }

    /* ── Grid ── */
    .rv-content { padding: 28px; flex: 1; }
    .rv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 18px; }

    /* ── Candidate cards ── */
    .rv-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .rv-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .rv-card-approved { border-color: #10b981; background: #f0fdf8; }
    .rv-card-rejected { border-color: #e5e7eb; background: #fafafa; opacity: 0.6; }
    .rv-card-briefed  { border-color: #7c3aed; background: #f5f3ff; }

    .rv-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
    .rv-timestamps { font-family: ui-monospace, monospace; font-size: 0.85rem; font-weight: 600; color: var(--text); }

    .rv-status-badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .rv-status-pending  { background: #f3f4f6; color: #6b7280; }
    .rv-status-approved { background: #ecfdf5; color: #059669; }
    .rv-status-rejected { background: #f9fafb; color: #9ca3af; }
    .rv-status-briefed  { background: #f5f3ff; color: #7c3aed; }

    .rv-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 4px; }
    .rv-hook { font-size: 0.9rem; color: var(--text); line-height: 1.5; }
    .rv-payoff { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

    .rv-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .rv-btn-approve.rv-btn-active { background: #10b981; color: #fff; cursor: default; }
    .rv-btn-approve.rv-btn-active:hover { background: #10b981; }
    .rv-btn-rejected-active { background: #e5e7eb; color: #6b7280; cursor: default; }
    .rv-btn-rejected-active:hover { background: #e5e7eb; }
    .rv-btn-briefed-active { background: #7c3aed; color: #fff; cursor: default; }
    .rv-btn-briefed-active:hover { background: #7c3aed; }

    /* ── Error toast ── */
    #rv-error {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #991b1b; color: #fff; padding: 12px 24px; border-radius: 8px;
      font-size: 0.88rem; z-index: 999; display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    @media (max-width: 600px) {
      .rv-content { padding: 16px; }
      .rv-grid { grid-template-columns: 1fr; }
      .rv-count-bar { gap: 16px; }
    }
  </style>
</head>
<body>
<div class="rv-shell">

  <!-- Topbar -->
  <div class="rv-topbar">
    <a class="rv-logo" href="/vbv-pipeline/vbv.html">VBV <span>Pipeline</span></a>
    <div class="rv-title" id="rv-header-source">Loading session&hellip;</div>
    <div class="rv-meta" id="rv-header-count"></div>
  </div>

  <!-- Count bar -->
  <div class="rv-count-bar">
    <div class="rv-count-item">
      <span class="rv-count-num" id="rv-count-total">–</span>
      <span>Total</span>
    </div>
    <div class="rv-count-item">
      <span class="rv-count-num green" id="rv-count-approved">–</span>
      <span>Approved</span>
    </div>
    <div class="rv-count-item">
      <span class="rv-count-num" style="color:#7c3aed;" id="rv-count-briefed">–</span>
      <span>Briefed</span>
    </div>
    <div class="rv-count-item">
      <span class="rv-count-num red" id="rv-count-rejected">–</span>
      <span>Rejected</span>
    </div>
    <div class="rv-count-item">
      <span class="rv-count-num" id="rv-count-pending">–</span>
      <span>Pending</span>
    </div>
    <button id="rv-brief-all-btn" class="vbv-btn vbv-btn-primary vbv-btn-sm" style="display:none;margin-left:auto;">Brief All</button>
    <a class="rv-back-link" href="/vbv-pipeline/vbv.html" style="margin-left:12px;">&larr; Back to Pipeline</a>
  </div>

  <!-- Body -->
  <div class="rv-content">
    <div id="rv-loading" class="vbv-loading">Loading candidates&hellip;</div>

    <div id="rv-body" style="display:none;">
      <div id="rv-grid" class="rv-grid"></div>
    </div>
  </div>

</div>

<!-- Error toast -->
<div id="rv-error"></div>

<script src="/vbv-pipeline/vbvReview.js"></script>
</body>
</html>
